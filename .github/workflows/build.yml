name: Construir APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # permite lanzarlo a mano desde la pestaña Actions

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Preparar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Generar estructura Android del proyecto
        run: flutter create --platforms=android --org cr.pura --project-name husos .

      - name: Colocar el código de la app
        run: cp husos_main.dart lib/main.dart

      - name: Añadir dependencia de zonas horarias
        run: flutter pub add timezone

      - name: Descargar dependencias
        run: flutter pub get

      - name: Compilar APK (release)
        run: flutter build apk --release

      - name: Publicar el APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: husos-apk
          path: build/app/outputs/flutter-apk/app-release.apk
