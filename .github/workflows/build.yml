name: Construir APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Preparar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Generar estructura Android del proyecto
        run: flutter create --platforms=android --org cr.pura --project-name husos .

      - name: Colocar el codigo de la app
        run: |
          cp husos_main.dart lib/main.dart
          cp splash_screen.dart lib/splash_screen.dart

      - name: Anadir dependencias
        run: |
          flutter pub add timezone
          flutter pub add dev:flutter_launcher_icons
          flutter pub add flutter_native_splash

      - name: Configurar icono y splash
        run: cat icon_splash_config.yaml >> pubspec.yaml

      - name: Descargar dependencias
        run: flutter pub get

      - name: Generar iconos de lanzador
        run: dart run flutter_launcher_icons

      - name: Generar splash nativo
        run: dart run flutter_native_splash:create

      - name: Poner el nombre visible de la app
        run: sed -i 's/android:label="husos"/android:label="Husos"/' android/app/src/main/AndroidManifest.xml

      - name: Compilar APK (release)
        run: flutter build apk --release

      - name: Publicar el APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: husos-apk
          path: build/app/outputs/flutter-apk/app-release.apk
